# =============================================================
# HerdSync V2 — Nginx reverse proxy config
# Deploy on the Lesotho Government server sitting in front of Kong.
# Replace <YOUR_DOMAIN> with the actual Ministry domain.
# =============================================================

server {
    listen 80;
    server_name <YOUR_DOMAIN>;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name <YOUR_DOMAIN>;

    # ── TLS ───────────────────────────────────────────────────
    ssl_certificate     /etc/ssl/herdsync/fullchain.pem;
    ssl_certificate_key /etc/ssl/herdsync/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ──────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss:;" always;

    # ── Rate limiting ─────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req zone=api burst=60 nodelay;

    # ── Frontend (Vite build output) ──────────────────────────
    location / {
        root /var/www/herdsync/dist;
        try_files $uri $uri/ /index.html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Supabase API (Kong gateway) ───────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering    off;
    }

    # ── Supabase Studio (restrict to Ministry IP range) ───────
    location /studio/ {
        # Restrict to Ministry of Agriculture internal network
        allow 196.3.0.0/16;   # GoL network range — update as needed
        deny  all;
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── Logs ──────────────────────────────────────────────────
    access_log /var/log/nginx/herdsync_access.log;
    error_log  /var/log/nginx/herdsync_error.log;
}
