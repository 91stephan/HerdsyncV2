name: Deploy — Supabase Migrations & Functions

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Push database migrations
        run: |
          PGHOST=$(python3 -c "import socket; print(socket.getaddrinfo('db.lrsygvqdbsrkkikaqdcg.supabase.co', 5432, socket.AF_INET)[0][4][0])")
          export PGHOST
          echo "Connecting to IPv4: $PGHOST"

          psql -c "CREATE SCHEMA IF NOT EXISTS supabase_migrations; CREATE TABLE IF NOT EXISTS supabase_migrations.schema_migrations (version text NOT NULL PRIMARY KEY, statements text[], name text);" 2>/dev/null || true

          for f in $(ls supabase/migrations/*.sql | sort); do
            version=$(basename "$f" | sed 's/[^0-9].*//')
            exists=$(psql -tAc "SELECT COUNT(*) FROM supabase_migrations.schema_migrations WHERE version='$version'" 2>/dev/null | tr -d ' ')
            if [ "$exists" = "1" ]; then
              echo "Skipping: $(basename $f)"
            else
              echo "Applying: $(basename $f)"
              psql -v ON_ERROR_STOP=0 -f "$f"
              psql -c "INSERT INTO supabase_migrations.schema_migrations(version,name) VALUES('$version','$(basename $f)') ON CONFLICT DO NOTHING"
            fi
          done
        env:
          PGPORT: "5432"
          PGUSER: postgres
          PGDATABASE: postgres
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PGSSLMODE: require

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy edge functions
        run: supabase functions deploy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Seed test users
        run: |
          curl -sf -X POST "${{ secrets.SUPABASE_URL }}/functions/v1/seed-test-data" -H "Content-Type: application/json" -d '{"action":"seed"}' | jq .
        continue-on-error: true
