name: Deploy — Supabase Migrations & Functions

# Runs automatically on every push to main.
# Pushes all pending migrations, deploys all edge functions,
# then calls the seed-test-data function to create test user accounts.
# No manual database access is required.

on:
  push:
    branches: [main]
  workflow_dispatch:           # allow manual trigger from GitHub UI

jobs:
  deploy:
    name: Deploy to Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 1. Push migrations via psql — bypasses Supabase CLI auth entirely.
      #    Tracks applied versions in supabase_migrations.schema_migrations
      #    (the same table the Supabase CLI uses).
      # ------------------------------------------------------------------
      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Push database migrations
        run: |
          # Force IPv4 — GitHub runners can't reach Supabase over IPv6
          export PGHOST=$(getent ahostsv4 db.lrsygvqdbsrkkikaqdcg.supabase.co | head -1 | awk '{print $1}')
          echo "Connecting to: $PGHOST"

          # Ensure migration tracking table exists
          psql -c "
            CREATE SCHEMA IF NOT EXISTS supabase_migrations;
            CREATE TABLE IF NOT EXISTS supabase_migrations.schema_migrations (
              version text NOT NULL PRIMARY KEY,
              statements text[],
              name text
            );
          " 2>/dev/null || true

          for f in $(ls supabase/migrations/*.sql | sort); do
            version=$(basename "$f" | sed 's/[^0-9].*//')
            exists=$(psql -tAc "SELECT COUNT(*) FROM supabase_migrations.schema_migrations WHERE version='$version'" 2>/dev/null | tr -d ' ')
            if [ "$exists" = "1" ]; then
              echo "Skipping (already applied): $(basename $f)"
            else
              echo "Applying: $(basename $f)"
              psql -v ON_ERROR_STOP=0 -f "$f"
              psql -c "INSERT INTO supabase_migrations.schema_migrations(version,name) VALUES('$version','$(basename $f)') ON CONFLICT DO NOTHING"
            fi
          done
        env:
          PGPORT: "5432"
          PGUSER: postgres
          PGDATABASE: postgres
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PGSSLMODE: require

      # ------------------------------------------------------------------
      # 2. Deploy edge functions via Supabase CLI.
      # ------------------------------------------------------------------
      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy edge functions
        run: supabase functions deploy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # ------------------------------------------------------------------
      # 3. Create / refresh test user accounts via the seed function.
      #    The function is a no-op in production (returns 403 if
      #    ENVIRONMENT=production is set on the function).
      # ------------------------------------------------------------------
      - name: Seed test users
        run: |
          curl -sf -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/seed-test-data" \
            -H "Content-Type: application/json" \
            -d '{"action":"seed"}' | jq .
        continue-on-error: true   # don't fail the whole deploy if seeding errors
