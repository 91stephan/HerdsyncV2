name: Deploy — Supabase Migrations & Functions

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify secrets and authenticate
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "ERROR: SUPABASE_ACCESS_TOKEN is empty — check the secret name in GitHub settings"
            exit 1
          fi
          echo "Token length: ${#SUPABASE_ACCESS_TOKEN}, prefix: ${SUPABASE_ACCESS_TOKEN:0:4}"
          # Write to all possible config locations the CLI might check
          mkdir -p "$HOME/.config/supabase" "$HOME/.supabase"
          printf '%s' "$SUPABASE_ACCESS_TOKEN" > "$HOME/.config/supabase/access-token"
          printf '%s' "$SUPABASE_ACCESS_TOKEN" > "$HOME/.supabase/access-token"
          echo "Token files written"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push database migrations
        run: supabase db push --password "$SUPABASE_DB_PASSWORD"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Deploy edge functions
        run: supabase functions deploy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Seed test users
        run: |
          curl -sf -X POST "${{ secrets.SUPABASE_URL }}/functions/v1/seed-test-data" -H "Content-Type: application/json" -d '{"action":"seed"}' | jq .
        continue-on-error: true
