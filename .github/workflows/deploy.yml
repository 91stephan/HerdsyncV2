name: Deploy — Supabase Migrations & Functions

# Runs automatically on every push to main.
# Pushes all pending migrations, deploys all edge functions,
# then calls the seed-test-data function to create test user accounts.
# No manual database access is required.

on:
  push:
    branches: [main]
  workflow_dispatch:           # allow manual trigger from GitHub UI

jobs:
  deploy:
    name: Deploy to Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD:  ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # ------------------------------------------------------------------
      # 1. Push all pending SQL migrations to the live database.
      #    config.toml has project_id; SUPABASE_DB_PASSWORD and
      #    SUPABASE_ACCESS_TOKEN are set at job level above.
      # ------------------------------------------------------------------
      - name: Push database migrations
        run: supabase db push

      # ------------------------------------------------------------------
      # 2. Deploy all Deno edge functions.
      # ------------------------------------------------------------------
      - name: Deploy edge functions
        run: supabase functions deploy

      # ------------------------------------------------------------------
      # 3. Create / refresh test user accounts via the seed function.
      #    The function is a no-op in production (returns 403 if
      #    ENVIRONMENT=production is set on the function).
      # ------------------------------------------------------------------
      - name: Seed test users
        run: |
          curl -sf -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/seed-test-data" \
            -H "Content-Type: application/json" \
            -d '{"action":"seed"}' | jq .
        continue-on-error: true   # don't fail the whole deploy if seeding errors
