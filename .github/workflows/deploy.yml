name: Deploy — Supabase Migrations & Functions

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push database migrations
        run: |
          mkdir -p "$HOME/.config/supabase"
          printf '%s' "$SUPABASE_ACCESS_TOKEN" > "$HOME/.config/supabase/access-token"
          supabase db push --password "$SUPABASE_DB_PASSWORD"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Deploy edge functions
        run: supabase functions deploy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Seed test users
        run: |
          curl -sf -X POST "${{ secrets.SUPABASE_URL }}/functions/v1/seed-test-data" -H "Content-Type: application/json" -d '{"action":"seed"}' | jq .
        continue-on-error: true
