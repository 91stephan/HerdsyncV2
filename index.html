      <section>
        <h2>What HerdSync does</h2>
        <ul>
          <li><strong>Livestock management</strong> — domestic and wild game records, automatic age calculation, soft-remove workflow that preserves your herd history.</li>
          <li><strong>Feeding schedules</strong> — animal-specific feed plans mapped directly to livestock IDs, with daily, weekly and monthly cost roll-ups.</li>
          <li><strong>Health &amp; vaccinations</strong> — per-animal medical records, vaccination tracking and treatment history.</li>
          <li><strong>RFID livestock tracking</strong> — checkpoint-based RFID/Arduino integration via Supabase webhooks for real-time animal location.</li>
          <li><strong>Inventory &amp; equipment</strong> — multi-category tracking of feed, chemicals, equipment and consumables with low-stock alerts.</li>
          <li><strong>Chemicals &amp; remedies</strong> — animal-linked chemical usage logs that satisfy South African residue and traceability requirements.</li>
          <li><strong>Farm expenses</strong> — operating cost tracking with receipt uploads and automatic inventory linking.</li>
          <li><strong>Animal sales</strong> — single-page sale workflow with voetstoots clause and PDF receipts.</li>
          <li><strong>AIDA &amp; SA compliance</strong> — Labour and OHS checklists, document vault, and an Audit Pack Builder that produces inspection-ready PDFs.</li>
          <li><strong>Market prices</strong> — South African agricultural commodity prices and trends for cattle, sheep, grain and produce.</li>
          <li><strong>Reports &amp; analytics</strong> — PDF cost analysis, livestock statistics and month-specific equipment reports, all in ZAR.</li>
          <li><strong>Employee management</strong> — Manager and Employee roles with daily task tracking and 7-day missed-task alerts.</li>
          <li><strong>Ask a Pro AI assistant</strong> — multimodal Gemini-powered farming assistant for instant answers on disease, breeds and best practice.</li>
          <li><strong>Native mobile apps</strong> — iOS and Android apps via Capacitor for field-ready use.</li>
        </ul>
      </section>

      <section>
        <h2>Pricing in South African Rand</h2>
        <p>Simple, transparent monthly pricing in ZAR. 14-day free trial of the Starter plan, no credit card required.</p>
        <ul>
          <li><strong>Basic — R99/month</strong>: Up to 80 animals. Core livestock, feeding, health, inventory and reports. Ideal for smallholders, hobby farms and emerging commercial operations.</li>
          <li><strong>Starter — R249/month</strong>: Everything in Basic plus market prices, expanded animal capacity and full compliance tools.</li>
          <li><strong>Pro — R599/month</strong>: Unlimited animals, full RFID tracking option (+ hardware), employee management and priority support. Web-based or RFID package.</li>
        </ul>
        <p><a href="/pricing">View full pricing and plan comparison →</a></p>
      </section>

      <section>
        <h2>Built for South African farmers</h2>
        <p>
          HerdSync is developed and maintained by <strong>The HerdSync Team</strong>,
          based in Krugersdorp, Gauteng. It was built in direct response to the
          day-to-day record-keeping, compliance and cost-control challenges
          faced by South African livestock producers — from smallholder
          herders to commercial cattle, sheep and game farms. Every feature is
          designed around South African regulation (AIDA, POPIA, OHS),
          South African Rand (ZAR), and the realities of farming in the SA
          climate and connectivity environment.
        </p>
